name: CozyBrew
options:
  bundleIdPrefix: com.s2j
  deploymentTarget:
    macOS: "14.6"
  developmentLanguage: en
  xcodeVersion: "26.3"
  lastUpgradeCheck: 2630
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.6"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    DEAD_CODE_STRIPPING: YES

packages:
  s2j-source-list:
    url: https://github.com/stein2nd/s2j-source-list.git
    branch: main
  s2j-about-window:
    url: https://github.com/stein2nd/s2j-about-window.git
    branch: main

targets:
  CozyBrewApp:
    type: application
    platform: macOS
    deploymentTarget: "14.6"
    sources:
      - path: CozyBrewApp
    resources:
      - path: CozyBrewApp/Assets.xcassets
    info:
      path: CozyBrewApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: 1
        LSMinimumSystemVersion: "14.6"
        NSHumanReadableCopyright: "Copyright © 2024 S2J. All rights reserved."
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: CozyBrewApp/CozyBrewApp.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.s2j.CozyBrew
      PRODUCT_NAME: $(TARGET_NAME)
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.6"
      CODE_SIGN_ENTITLEMENTS: CozyBrewApp/CozyBrewApp.entitlements
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      ENABLE_HARDENED_RUNTIME: true
      ENABLE_APP_SANDBOX: false
    dependencies:
      - target: CozyBrewCore
      - target: CozyBrewService
      - target: CozyBrewUIComponents

  CozyBrewCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.6"
    sources:
      - path: Sources/CozyBrewCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.s2j.CozyBrewCore
      PRODUCT_NAME: CozyBrewCore
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.6"
      DEFINES_MODULE: true
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0

  CozyBrewService:
    type: framework
    platform: macOS
    deploymentTarget: "14.6"
    sources:
      - path: Sources/CozyBrewService
    dependencies:
      - target: CozyBrewCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.s2j.CozyBrewService
      PRODUCT_NAME: CozyBrewService
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.6"
      DEFINES_MODULE: true
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0

  CozyBrewUIComponents:
    type: framework
    platform: macOS
    deploymentTarget: "14.6"
    sources:
      - path: Sources/CozyBrewUIComponents
    dependencies:
      - target: CozyBrewService
      - package: s2j-source-list
        product: S2JSourceList
      - package: s2j-about-window
        product: S2JAboutWindow
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.s2j.CozyBrewUIComponents
      PRODUCT_NAME: CozyBrewUIComponents
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.6"
      DEFINES_MODULE: true
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0

schemes:
  CozyBrewApp:
    build:
      targets:
        CozyBrewApp: all
        CozyBrewCore: all
        CozyBrewService: all
        CozyBrewUIComponents: all
    run:
      config: Debug
